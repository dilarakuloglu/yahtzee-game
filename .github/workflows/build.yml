name: Build Windows Client

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyqt6 pyinstaller

      - name: Build executable
        working-directory: client
        run: >
          pyinstaller --onefile --windowed
          "--add-data=ui/screens/ui_files/game_screen.ui;ui/screens/ui_files"
          "--add-data=ui/screens/ui_files/start_screen.ui;ui/screens/ui_files"
          "--add-data=ui/screens/ui_files/lobby_screen.ui;ui/screens/ui_files"
          "--add-data=ui/screens/ui_files/end_screen.ui;ui/screens/ui_files"
          --name YahtzeeClient
          main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YahtzeeClient-Windows
          path: client/dist/YahtzeeClient.exe
